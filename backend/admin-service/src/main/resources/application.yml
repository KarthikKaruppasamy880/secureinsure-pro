server:
  port: 8085
  servlet:
    context-path: /admin

spring:
  application:
    name: admin-service
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/secureinsure_admin
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    jpa:
      defer-datasource-initialization: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  cloud:
    discovery:
      enabled: true
    config:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.secureinsure.admin: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Security Configuration
security:
  jwt:
    secret: ${JWT_SECRET:your-secret-key-here}
    expiration: 86400000 # 24 hours

# Admin Service Configuration
admin:
  audit:
    retention-days: 90
    cleanup-enabled: true
    cleanup-schedule: "0 0 2 * * ?" # Daily at 2 AM
  configuration:
    encryption-enabled: true
    sensitive-fields: password,secret,key,token
  monitoring:
    health-check-interval: 30000 # 30 seconds
    metrics-enabled: true

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
      show-components: always
  health:
    db:
      enabled: true
    disk:
      enabled: true
    redis:
      enabled: false

# Swagger Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  info:
    title: SecureInsure Pro - Admin Service API
    description: Admin service for system administration and monitoring
    version: 1.0.0
    contact:
      name: SecureInsure Pro Team
      email: admin@secureinsure.com

# Database Connection Pool
spring:
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

# Cache Configuration
spring:
  cache:
    type: none

# Async Configuration
spring:
  task:
    execution:
      pool:
        core-size: 5
        max-size: 10
        queue-capacity: 25 