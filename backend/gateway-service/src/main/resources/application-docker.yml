spring:
  application:
    name: gateway-service
  
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://auth-service:8081}
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=2
        - id: policy-service
          uri: ${POLICY_SERVICE_URL:http://policy-service:8082}
          predicates:
            - Path=/api/v1/policies/**
          filters:
            - StripPrefix=2
        - id: claims-service
          uri: ${CLAIMS_SERVICE_URL:http://claims-service:8083}
          predicates:
            - Path=/api/v1/claims/**
          filters:
            - StripPrefix=2
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://notification-service:8084}
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - StripPrefix=2
        - id: admin-service
          uri: ${ADMIN_SERVICE_URL:http://admin-service:8085}
          predicates:
            - Path=/api/v1/admin/**
          filters:
            - StripPrefix=2
        - id: search-service
          uri: ${SEARCH_SERVICE_URL:http://search-service:8086}
          predicates:
            - Path=/api/v1/search/**
          filters:
            - StripPrefix=2
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: 
              - "http://localhost:3000"
              - "http://frontend:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      timeout: 60000

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG