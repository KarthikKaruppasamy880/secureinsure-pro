version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: secureinsure-postgres
    environment:
      POSTGRES_DB: secureinsure_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - secureinsure-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: secureinsure-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - secureinsure-network

  # Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: secureinsure-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - secureinsure-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: secureinsure-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:3000/api/v1
    networks:
      - secureinsure-network

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:

networks:
  secureinsure-network:
    driver: bridge 