version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: secureinsure-postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql
    networks:
      - secureinsure-network

  redis:
    image: redis:7-alpine
    container_name: secureinsure-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - secureinsure-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: secureinsure-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - secureinsure-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: secureinsure-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8080/api/v1
    networks:
      - secureinsure-network

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:

networks:
  secureinsure-network:
    driver: bridge
