name: BugBot (Managed by Cursor App)
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  note-only:
    name: No-CLI placeholder
    runs-on: ubuntu-latest
    steps:
      - name: Explain behavior
        run: |
          echo "✅ BugBot reviews are handled by the Cursor GitHub App."
          echo "ℹ️ No CLI is used in CI. Open or update this PR to trigger BugBot comments."
          echo "   - PR → Conversation tab: summary comment"
          echo "   - PR → Files changed tab: inline comments"
      - name: Succeed cleanly
        run: exit 0
