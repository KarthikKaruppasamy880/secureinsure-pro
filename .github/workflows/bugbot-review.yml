name: BugBot Review
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
permissions:
  pull-requests: write
  contents: read

jobs:
  bugbot-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Cursor CLI
        run: npm i -g @cursorai/cli

      - name: Run BugBot on this PR
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: cursor review --pr ${{ github.event.pull_request.html_url }}
